<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PareidoMap — Mobile App</title>
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="clippy.jsx"></script>
<script type="text/babel" src="regions.jsx"></script>
<script type="text/babel" src="map-overlay.jsx"></script>
<script type="text/babel" src="screen-onboarding.jsx"></script>
<script type="text/babel" src="screen-camera.jsx"></script>
<script type="text/babel" src="screen-segment.jsx"></script>
<script type="text/babel" src="screen-loading.jsx"></script>
<script type="text/babel" src="screen-result.jsx"></script>
<script type="text/babel" src="screen-style.jsx"></script>
<script type="text/babel" src="screen-share.jsx"></script>
<script type="text/babel" src="screen-gallery.jsx"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "photo": "wall",
  "mode": "canvas"
}/*EDITMODE-END*/;

function Phone({ label, num, children }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }} data-screen-label={`${num} ${label}`}>
      <div className="phone-label">
        <span className="phone-num">№ {num}</span>
        <span>{label}</span>
      </div>
      <div style={{
        width: 320, height: 692, borderRadius: 44, overflow: 'hidden',
        position: 'relative', background: '#000',
        boxShadow: '0 30px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06), inset 0 0 0 3px #1a1817',
      }}>
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
          width: 104, height: 30, borderRadius: 20, background: '#000', zIndex: 100,
        }} />
        {/* time */}
        <div style={{
          position: 'absolute', top: 16, left: 24, zIndex: 90,
          fontFamily: '-apple-system, system-ui', fontWeight: 600, fontSize: 14,
          color: '#0A0A0A', mixBlendMode: 'difference',
        }}>9:41</div>
        <div style={{
          position: 'absolute', top: 18, right: 24, zIndex: 90,
          display: 'flex', gap: 5, alignItems: 'center', color: '#0A0A0A', mixBlendMode: 'difference',
        }}>
          <svg width="16" height="10" viewBox="0 0 19 12">
            <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="currentColor"/>
            <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="currentColor"/>
            <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="currentColor"/>
            <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="currentColor"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 27 13">
            <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" strokeOpacity="0.5" fill="none"/>
            <rect x="2" y="2" width="18" height="9" rx="2" fill="currentColor"/>
          </svg>
        </div>
        {/* home indicator */}
        <div style={{
          position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
          zIndex: 100, width: 110, height: 4, borderRadius: 100,
          background: 'rgba(0,0,0,0.4)', mixBlendMode: 'difference',
        }} />
        {children}
      </div>
    </div>
  );
}

function App() {
  const [tw, setTw] = React.useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [flowStep, setFlowStep] = React.useState(0);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tw, [k]: v };
    setTw(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Auto-advance loading in flow mode
  React.useEffect(() => {
    if (tw.mode === 'flow' && flowStep === 3) {
      const t = setTimeout(() => setFlowStep(4), 3400);
      return () => clearTimeout(t);
    }
  }, [tw.mode, flowStep]);

  if (tw.mode === 'flow') {
    const labels = ['INTRO','CAPTURE','SEGMENT','MATCHING','RESULT','STYLE','SHARE','JOURNAL'];
    const screens = [
      <ScreenOnboarding onStart={() => setFlowStep(1)} />,
      <ScreenCamera     photo={tw.photo} onCapture={() => setFlowStep(2)} onBack={() => setFlowStep(0)} />,
      <ScreenSegment    variant={tw.photo} onConfirm={() => setFlowStep(3)} onBack={() => setFlowStep(1)} />,
      <ScreenLoading />,
      <ScreenResult     photo={tw.photo} onStyle={() => setFlowStep(5)} onBack={() => setFlowStep(2)} />,
      <ScreenStyle      photo={tw.photo} region="italy" onShare={() => setFlowStep(6)} onBack={() => setFlowStep(4)} />,
      <ScreenShare      photo={tw.photo} region="italy" onDone={() => setFlowStep(7)} onBack={() => setFlowStep(5)} />,
      <ScreenGallery    onNew={() => setFlowStep(1)} onBack={() => setFlowStep(0)} tab="gallery" onTab={(k) => { if (k === 'snap') setFlowStep(1); if (k === 'home') setFlowStep(0); }} />,
    ];
    return (
      <>
        <div className="stage" style={{ minHeight: '100vh' }}>
          <Phone label={labels[flowStep]} num={String(flowStep + 1).padStart(2, '0')}>
            {screens[flowStep]}
          </Phone>
        </div>
        <div style={{
          position: 'fixed', bottom: 12, left: '50%', transform: 'translateX(-50%)',
          display: 'flex', gap: 6, zIndex: 999, background: 'rgba(0,0,0,0.5)', padding: '8px 12px', borderRadius: 999,
        }}>
          {screens.map((_, i) => (
            <button key={i} onClick={() => setFlowStep(i)} style={{
              width: 9, height: 9, borderRadius: 999, padding: 0, cursor: 'pointer',
              background: i === flowStep ? '#fff' : 'transparent',
              border: '1px solid rgba(255,255,255,0.6)',
            }}/>
          ))}
        </div>
        <TweakPanel show={showTweaks} tw={tw} update={updateTweak} />
      </>
    );
  }

  return (
    <>
      <div className="stage">
        <Phone label="INTRO"    num="01"><ScreenOnboarding onStart={() => {}} /></Phone>
        <Phone label="CAPTURE"  num="02"><ScreenCamera photo={tw.photo} onCapture={() => {}} onBack={() => {}} /></Phone>
        <Phone label="SEGMENT"  num="03"><ScreenSegment variant={tw.photo} onConfirm={() => {}} onBack={() => {}} /></Phone>
        <Phone label="MATCHING" num="04"><ScreenLoading /></Phone>
        <Phone label="RESULT"   num="05"><ScreenResult photo={tw.photo} onStyle={() => {}} onBack={() => {}} /></Phone>
        <Phone label="STYLE"    num="06"><ScreenStyle photo={tw.photo} region="italy" onShare={() => {}} onBack={() => {}} /></Phone>
        <Phone label="SHARE"    num="07"><ScreenShare photo={tw.photo} region="italy" onDone={() => {}} onBack={() => {}} /></Phone>
        <Phone label="JOURNAL"  num="08"><ScreenGallery onNew={() => {}} tab="gallery" /></Phone>
      </div>
      <TweakPanel show={showTweaks} tw={tw} update={updateTweak} />
    </>
  );
}

function TweakPanel({ show, tw, update }) {
  if (!show) return null;
  const opt = (k, v, label) => (
    <button key={v} className={tw[k] === v ? 'active' : ''} onClick={() => update(k, v)}>{label}</button>
  );
  return (
    <div className="tweaks-panel">
      <h4>View</h4>
      <div className="row">
        {opt('mode','canvas','All screens')}
        {opt('mode','flow','Single flow')}
      </div>
      <h4>Photo substrate</h4>
      <div className="row">
        {opt('photo','wall','Wall')}
        {opt('photo','plate','Plate')}
        {opt('photo','moss','Moss')}
        {opt('photo','cloud','Cloud')}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
